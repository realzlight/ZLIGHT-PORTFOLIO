<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Eternity</title>
  <style>
   body{
      background-color:black;
      margin: 0; /* Remove default margin */
      font-family: Arial, sans-serif; /* Added a default font */
    }
    ul li{
      color:white;
      list-style:none;
      font-weight:520;
      font-size:1.1rem;
    }
    .nav ul{
      display:flex;
      justify-content: space-between; /* Space out nav items */
      align-items: center;
      padding: 0 20px; /* Add padding to the nav bar */
      margin: 0;
      
    }
    .sign{
      /* Simplified margin, using flex layout in ul */
      color:black;
      background-color:white;
      border:1px solid white;
      scale:1.1; /* Reduced scale slightly */
      font-weight:500;
      width:75px;
      height:28px;
      border-radius:20px;
      font-size:0.85rem;
      cursor: pointer;
    }
    .msg{
      /* "Eternity" text styling */
      padding: 10px 0;
    }
    .chats{
      background-color:black;
      width:100%;
      flex-grow: 1;
      overflow-y:auto;
      padding: 10px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      padding-bottom: 30px; /* Space above the input area */
    }
    .nav{
      background-color:rgba(0, 0, 0, 0.8); /* Semi-transparent background */
      backdrop-filter: blur(5px); /* Optional: add a blur effect */
      position:sticky;
      top:0;
      z-index: 10; /* Ensure nav is on top */
    }
    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .input{
      background-color:black;
      width:100%;
      /* Adjusted height to be flexible and added padding */
      height: auto; 
      padding: 15px 10px;
      margin:0;
      display:flex;
      gap:10px;
      align-items: center; /* Vertically align items */
      position: sticky;
      bottom: 0;
      border-top: 1px solid #333;
    } 
  
    .inputbox{
      flex-grow: 1; /* Allows the input to take up available space */
      height:45px;
      /* Removed fixed width and margin-left */
      border:0.10px solid #f5f5f5;
      background-color:#212020;
      border-radius:25px;
      padding: 0 15px;
      color:white;
      outline:none;
      box-shadow:none;
      font-size:1.01rem;
    }
    .add, .sendbtn{
      width:48px;
      height:48px; /* Square buttons */
      border-radius:24px;
      border:0.10px solid #f5f5f5;
      background-color:#212020;
      color:#fff;
      font-weight:500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0; /* Prevents buttons from shrinking */
    }
    .add{
      font-size:2rem;
      font-weight:350;
      background-color:#212020;
    }
    .sendbtn{
      color:black;
      background-color:#fff;
      font-size:1.5rem; /* Increased size for the emoji */
    }
    
    /* User Message Style */
    .msgbox.user {
      min-height: 30px; 
      max-width: 70%; /* Limit width for better readability */
      background-color: #007aff; /* iOS Blue for user messages */
      margin-left: auto; /* Push user message to the right */
      margin-right: 10px;
      margin-top: 15px;
      border-radius: 20px 20px 0px 20px;
      padding: 10px 15px; 
      word-wrap: break-word; 
      overflow-wrap: break-word;
      color:white;
      align-self: flex-end; /* Ensure it stays right in flex container if Chats were flex */
    }

    /* Bot Message Style */
    .msgbox.bot {
      min-height: 30px; 
      max-width: 70%;
      background-color: #333; /* Darker background for bot messages */
      margin-left: 10px; /* Push bot message to the left */
      margin-right: auto;
      margin-top: 15px;
      border-radius: 20px 20px 20px 0px; /* Different corner for the bot */
      padding: 10px 15px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      color:white;
      align-self: flex-start;
    }

    .chats > div {
        /* Makes all message boxes display nicely in the scroll container */
        display: block;
        clear: both;
    }
.nav {
  background-color:transparent;
}
  </style>
</head>
<body>
  <div class="container" id="Container">
    <nav class="nav" id="Nav">
      <ul>
        <li class="msg">Eternity</li>
        <li><button class="sign">Sign up</button></li>
      </ul>
    </nav>
    <div class="chats" id="Chats">
        <div class="msgbox bot">Hello! I'm Eternity, How can I assist you today?</div>
        <div class="msgbox user">Ask Eternity</div>
    </div>
    <div class="input" id="Input">
     <button class="add" id="Add">+</button>
<input type="file" id="fileInput" style="display: none;" />

      <input type="text" placeholder="Ask Eternity" id="inputBox" class="inputbox" >
      <button class="sendbtn" id="sendBtn">▶</button>
    </div>
  </div>
  <script>
    const inputbox = document.getElementById('inputBox');
    const sendbtn = document.getElementById('sendBtn');
    const chatarea = document.getElementById('Chats');
    
    // ⚠️ SECURITY CRITICAL FIX: These variables MUST be removed from client-side code.
    // The API key is a secret credential and is highly vulnerable here.
    // const apiKey = 'AIzaSyB-tz47V6usncbQOCdllCmrtJlzKDjL6Os';
    // const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

    // ✅ SECURE APPROACH: Use a relative path to a secure backend endpoint.
    const backendEndpoint = '/api/gemini-chat';


    // Function to create and append a message box
    function appendMessage(text, sender) {
        const msgbox = document.createElement('div');
        msgbox.textContent = text;
        msgbox.classList.add('msgbox');
        msgbox.classList.add(sender === 'user' ? 'user' : 'bot'); // Apply user or bot styling
        chatarea.appendChild(msgbox);
        chatarea.scrollTop = chatarea.scrollHeight; // scroll to the bottom
    }

    async function sendmsg(){
      let msg = inputbox.value.trim();
      
      if (msg === '') return; // Don't send empty messages

      // 1. Display user message
      appendMessage(msg, 'user');
      inputbox.value = ''; // clear the input box
      
      // 2. Display a temporary "Thinking..." message
      const thinkingMsg = appendMessage('...', 'bot');
      
      try {
        // 3. Make the fetch request to your secure backend server
        const response = await fetch(backendEndpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          // Send only the user's message text to the server
          body: JSON.stringify({
            prompt: msg 
          })
        });

        // Check if the response was successful
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        
        // Assuming your backend sends the final text response in a 'reply' field
        const reply = data.reply || "Error: Backend did not return a valid response.";
        
        // 4. Update the 'thinking' message with the actual reply
        chatarea.removeChild(thinkingMsg); // Remove the '...' message
        appendMessage(reply, 'bot');

      } catch (error) {
        console.error('Error communicating with the backend:', error);
        chatarea.removeChild(thinkingMsg); // Remove '...' message
        appendMessage("Sorry, I'm having trouble connecting right now. Please try again later.", 'bot');
      }
    }

    // Use Event Listener for the Send button and Enter key
    sendbtn.addEventListener('click', sendmsg);
    inputbox.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendmsg();
        }
    });
  
  
  const addButton = document.getElementById('Add');
const fileInput = document.getElementById('fileInput');

addButton.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  const selectedFile = e.target.files[0];
  console.log(selectedFile);
  // Perform actions on the selected file
});
  
  
  
  </script>
</html>
</body>
</html>
